<!-- MAIN -->



<main class="admin-main">






<header class="admin-header">


<div>


<h1>

Coupons Management

</h1>


<p>

Create and manage discount coupons

</p>


</div>





<button id="add-coupon-btn">


Add Coupon


</button>



</header>









<!-- COUPON FORM -->



<section

class="product-form-card"

id="coupon-form-section"

style="display:none;">





<h2>

Create Coupon

</h2>







<form id="coupon-form">






<input

type="text"

id="coupon-code"

placeholder="Coupon Code"

required>







<select id="discount-type">



<option value="percentage">

Percentage Discount

</option>



<option value="fixed">

Fixed Amount

</option>



</select>







<input

type="number"

id="discount-value"

placeholder="Discount Value"

required>








<input

type="number"

id="minimum-purchase"

placeholder="Minimum Purchase Amount">








<input

type="date"

id="coupon-expiry"

required>








<button

type="submit">


Save Coupon


</button>






</form>





</section>









<!-- COUPON LIST -->



<section class="admin-section">



<h2>

All Coupons

</h2>






<div

id="coupon-list">


</div>





</section>








</main>
